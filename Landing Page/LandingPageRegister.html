<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="contenedor_register">                              <!-- Contenedor para register -->

        <a href="LandingPage.html" class="boton_volver">Back</a>   <!-- Boton que te redirige a la landing page -->

        <h1>Registrar</h1>
        <form action="">
            <!-- Etiqueta de correo para el registrar -->
            <label for="correo">Correo:</label>
            <input type="text" name="correo" id="correo"><br><br>

            <!-- Etiqueta de Cedula de identidad para el registrar -->
            <label for="CI">CI:</label>
            <input type="text" name="CI" id="CI"><br><br>

            <!-- Etiqueta de contraseña para el registrar -->
            <label for="contraseña">Contraseña:</label>
            <input type="text" name="contraseña" id="contraseña"><br><br>

            <!-- Etiqueta de confirmar contraseña para el registrar -->
            <label for="conf_contraseña">Confiramr contraseña:</label>
            <input type="text" name="conf_contraseña" id="conf_contraseña"><br><br>
        </form>
    </div>                                                         <!-- Cerrar el contenedor para register -->
</body>
</html>
